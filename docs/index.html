<title>CLC Tunebook</title>

<style>

    body {
        font-family: Arial, sans-serif;
        background-color: #FFFFFF;
        margin: 0px;
        padding: 0px;
    }

    .container {
        margin: 0px auto;
        text-align: center;
        overflow-x: hidden;
    }

    h1 {
        font-size: 24px;
        margin-top: 16px;
        margin-bottom: 0px;
        color: #000000;
    }

    h2 {
        font-size: 16px;
        margin-top: 8px;
        margin-bottom: 0px;
        color: #000000;
    }

    p {
        color: #000000;
    }

    a {
        color: #000000;
    }
    a:link {
        color: #000000;
    }
    a:visited {
        color: #000000;
    }
    a:hover {
        color: #000000;
    }
    a:active {
        color: #000000;
    }

    #fullscreenbutton {
        position: fixed;
        top: 16px;   /* Distance from the top of the page */
        right: 16px; /* Distance from the right of the page */
        padding: 10px 20px;
        background-color: #007BFF;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        z-index: 1000; /* Ensures it stays above other content */
    }

    #fullscreenbutton:hover {
        background-color: #0056b3;
    }

    select {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' fill='%238C98F2'><polygon points='0,0 100,0 50,50'/></svg>") no-repeat;
        background-size: 12px;
        background-position: calc(100% - 10px) center;
        background-repeat: no-repeat;
        background-color: #efefef;
        color: black;
        font-size: 17px;
        padding: 5px;
        margin-top: 12px;
        margin-bottom: 16px;
        width: 350px;
    }

    iframe {
        border: 1px solid #ccc;
        background-color: #ffffff;
    }

    #footer1{
        margin-top: 12px;
        margin-bottom: 12px;
        color: #000000;
    }

    #footer2{
        margin-top: 12px;
        margin-bottom: 0px;
        color: #000000;
    }

    #previous_tune, #next_tune{
        padding: 10px 15px;
        background-color: #dddddd;
        color: black;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        z-index: 1000; /* Ensures it stays above other content */
        margin-top: 12px;
        margin-bottom: 16px;
        transform:translate(0px, -1px);
    }

    #previous_tune{
        margin-right:10px;
    }

    #next_tune{
        margin-left:10px;
    }

    #next_tune:hover {
        background-color: palegreen;
    }

    #previous_tune:hover {
        background-color: palegreen;
    }

    * {
      touch-action: manipulation;
    }

</style>

</head>

    // Set this to false to disable state persistence
    var gAllowStatePersistence = true;

    // Set this to false to hide previous and next tune buttons
    var gAllowPreviousNextButtons = true;

    var lastURL = "";

    // Populate the selector with options from JSON
    document.addEventListener('DOMContentLoaded', () => {

        document.getElementById('fullscreenbutton').addEventListener('click', function() {
            if (lastURL != ""){
             window.open(lastURL, '_blank');
            }
        });

        const tuneSelector = document.getElementById('tuneSelector');

        const tuneFrame = document.getElementById('tuneFrame');

        if (tunes.length > 1){

           tunes.forEach(tune => {
               const option = document.createElement('option');
               option.value = tune.URL;
               option.textContent = tune.Name;
               tuneSelector.appendChild(option);
           });

           // Update iframe src when an option is selected
           tuneSelector.addEventListener('change', () => {

               var theURL = tuneSelector.value;

               if (theURL == "")return;

               tuneFrame.src = theURL;
               lastURL = theURL;

               // Save last tune
               if (gAllowStatePersistence){

                   if (window.localStorage){

                       localStorage.lastTuneName_MFVFLQB = tuneSelector.options[tuneSelector.selectedIndex].text;
                   }

               }

           });

          if (gAllowPreviousNextButtons){

               document.getElementById('next_tune').addEventListener('click', nextTune);

               document.getElementById('previous_tune').addEventListener('click', previousTune);

               function nextTune(){ 
                   var tuneIndex = tuneSelector.selectedIndex;
                   tuneIndex++;
                   if (tuneIndex > tunes.length){
                    tuneIndex = tunes.length;
                   }
                   tuneSelector.selectedIndex = tuneIndex;
                   tuneSelector.dispatchEvent(new Event('change'));
               }

               function previousTune(){
                   var tuneIndex = tuneSelector.selectedIndex;
                   tuneIndex--;
                   if (tuneIndex < 0){
                       tuneIndex = 0;
                   }
                   tuneSelector.selectedIndex = tuneIndex;
                   tuneSelector.dispatchEvent(new Event('change'));
               }
          }
          else{
               document.getElementById('next_tune').style.display="none";
               document.getElementById('previous_tune').style.display="none";
          }

        }
        else{

           tuneSelector.style.display="none";

           document.getElementById('next_tune').style.display="none";
           document.getElementById('previous_tune').style.display="none";

           setTimeout(function(){

             var theURL = tunes[0].URL;

             if (theURL == "")return;

             tuneFrame.src = theURL;
             lastURL = theURL;

           },250);
        }

       function getElementsTotalHeight() {

           var ids;

           if (tunes.length > 1){
               if (gAllowPreviousNextButtons){
                   ids = ['title', 'subtitle', 'previous_tune', 'footer1', 'footer2'];
               }
               else{
                   ids = ['title', 'subtitle', 'tuneSelector', 'footer1', 'footer2'];
               }
           }
           else{
               ids = ['title', 'subtitle', 'displayOptions', 'footer1', 'footer2'];
           }

           let totalHeight = 0;

           ids.forEach(id => {

               const element = document.getElementById(id);

               if (element && (element.textContent.trim() !== "")) {
                   const elementHeight = element.offsetHeight;
                   const computedStyle = window.getComputedStyle(element);

                   // Include margins
                   const marginTop = parseFloat(computedStyle.marginTop);
                   const marginBottom = parseFloat(computedStyle.marginBottom);
                   totalHeight += elementHeight + marginTop + marginBottom + 1;
               }
           });

           if ((tunes.length == 1) && (!document.getElementById('displayOptions'))){
               totalHeight += 24;
           }
           return totalHeight+10;
       }

       function resizeIframe() {
           const iframe = document.getElementById('tuneFrame');
           iframe.style.width = (window.innerWidth-3) + 'px';
           var otherElementsHeight = getElementsTotalHeight();
           iframe.style.height = (window.innerHeight-otherElementsHeight) + 'px';
       }

       function setSelectedTuneByName(optionText) {
           var gotMatch = false;
           for (let i = 0; i < tuneSelector.options.length; i++) {
               if (tuneSelector.options[i].text === optionText) {
                   tuneSelector.selectedIndex = i;
                   gotMatch = true;
                   break;
               }
           }
           if (gotMatch){
               tuneSelector.dispatchEvent(new Event('change'));
           }
       }

       // Resize the iframe on window resize
       window.addEventListener('resize', resizeIframe);

       // Initial call to ensure it fits when the page loads
       resizeIframe();

       // Restore state
       if (gAllowStatePersistence){

          if (window.localStorage){

              setTimeout(function(){

                if (tunes.length > 1){

                   var theLastTuneName = localStorage.lastTuneName_MFVFLQB;
                   if (theLastTuneName && (theLastTuneName != "")){
                       setSelectedTuneByName(theLastTuneName);
                   }

                }

             },250);
          }
       }
    });

</script>
